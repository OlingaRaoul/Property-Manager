services:
  mongodb:
    image: mongo:6.0-jammy
    container_name: pm_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pm_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/property_manager}
      - JWT_SECRET=pm_super_secret_key_production_2026
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pm_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
    driver: local
